seta com_introPlayed 1
seta ui_cdkeychecked 1
seta ui_cdkeychecked2 1
seta sp_ui 1
seta sp_dropHM 1
// Align gamepad/touch binds with the on-screen button keycodes (touch_controls.h).
// The device's saved efspconfig.cfg has stale binds (PAD0_X=+altattack) that the menu
// default no longer overrides; force the correct ones here (autoexec runs last).
bind PAD0_X "+use"
bind PAD0_LEFTTRIGGER "+altattack"
